app:
  kafka:
    topic: user-actions

spring:
  application:
    name: datafirewall-kafka
    version: ${APP_VERSION:0.0.1}
    projectName: datafirewall

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/meta_base}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driverClassName: org.postgresql.Driver
    defaultSchema: public
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: TargetDBPool

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: public
  
  kafka:
    bootstrap-servers: kafka1:9093,kafka2:9093
    ssl:
      bundle: kafka-client

    consumer:
      group-id: audit-consumer-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

    listener:
      ack-mode: manual_immediate

    properties:
      security.protocol: SSL
      # при необходимости:
      # ssl.endpoint.identification.algorithm: https

  flyway:
    schemas: public
    enabled: true
    locations: classpath:db/migration
    url: ${DB_URL:jdbc:postgresql://localhost:5432/meta_base}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

logs-database:
  enabled: true
  task-create-partition: 0 0 0 * * ?
  url: jdbc:postgresql://localhost:5432/db_log
  username: postgres
  password: postgres
  driverClassName: org.postgresql.Driver
  table: "audit.jdata_postgres_log"

clean-database-logs:
  # cron expression, to switch off put value '-'
  task-cleaner-schedule: 0 0 1 * * ?
  # delete logs from db that older than X days
  clean-period: 1080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  cef:
    path: logs
    fileName: cef.log
    retention-days: 90
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.engine.jdbc.connections.internal.DriverManagerConnectionProviderImpl: DEBUG
    org.apache.flink: INFO
    org.springframework.jdbc: WARN
    com.gpb.replication.postgres: DEBUG
  file:
    name: logs/jdata.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 7
